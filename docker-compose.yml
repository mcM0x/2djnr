version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: twodjnr
      POSTGRES_USER: twodjnr
      POSTGRES_PASSWORD: twodjnr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  server1:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: "7001"
      DB_URL: jdbc:postgresql://postgres:5432/twodjnr
      DB_USER: twodjnr
      DB_PASSWORD: twodjnr
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: 2DJNR-SuperSecretKey-AtLeast32BytesLong!
    ports:
      - "7001:7001"
    depends_on:
      - postgres
      - redis

  server2:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: "7002"
      DB_URL: jdbc:postgresql://postgres:5432/twodjnr
      DB_USER: twodjnr
      DB_PASSWORD: twodjnr
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: 2DJNR-SuperSecretKey-AtLeast32BytesLong!
    ports:
      - "7002:7002"
    depends_on:
      - postgres
      - redis

  server3:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: "7003"
      DB_URL: jdbc:postgresql://postgres:5432/twodjnr
      DB_USER: twodjnr
      DB_PASSWORD: twodjnr
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: 2DJNR-SuperSecretKey-AtLeast32BytesLong!
    ports:
      - "7003:7003"
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server1
      - server2
      - server3

volumes:
  pgdata:
